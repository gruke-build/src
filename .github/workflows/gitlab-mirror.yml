name: Mirroring

on: [push, delete, workflow_dispatch]

jobs:
  to_gitlab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url:
            git@gitlab.com:gruke-build/src.git
          ssh_private_key:
            ${{ secrets.GITLAB_SSH_KEY }}