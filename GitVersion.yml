mode: ContinuousDeployment

assembly-versioning-scheme: MajorMinor
assembly-file-versioning-scheme: MajorMinorPatch
prevent-increment:
  of-merged-branch: true
  when-branch-merged: true
  when-current-commit-tagged: true

branches:
  master:
    label: ''
    regex: ^master$|^main$
  develop:
    label: 'alpha'
    regex: ^develop$
  release:
    label: 'beta'
    regex: ^release(\/.+)$

ignore:
  sha: []